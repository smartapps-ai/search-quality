<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340" font-family="'Georgia', 'Times New Roman', serif">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000018"/>
    </filter>
    <filter id="shadowMed" x="-8%" y="-8%" width="125%" height="135%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="3" flood-color="#00000025"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arr"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,7 L9,3.5 z" fill="#444"/></marker>
    <marker id="arrB" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,7 L9,3.5 z" fill="#1D4ED8"/></marker>
    <marker id="arrG" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,7 L9,3.5 z" fill="#065F46"/></marker>
    <marker id="arrO" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,7 L9,3.5 z" fill="#92400E"/></marker>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9FAFB"/>
      <stop offset="100%" stop-color="#EEF1F7"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#BBF7D0"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="metricGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDF4FF"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="340" rx="10" fill="url(#bgGrad)" stroke="#CBD5E1" stroke-width="1.2"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1E293B" letter-spacing="0.3">Answer Evaluation Pipeline</text>
  <line x1="60" y1="35" x2="800" y2="35" stroke="#CBD5E1" stroke-width="0.8"/>

  <!-- Row labels (phase) -->
  <text x="430" y="50" text-anchor="middle" font-size="8.5" fill="#94A3B8" font-style="italic">Questions → Chatbot → Answer → Evaluation → Metrics</text>

  <!--
  ══ BOX GEOMETRY ══
    A  Synth Custom (A):     x=18  y=80  w=130 h=50  cx=83  cy=105  R=148 B=130
    B  Synth RW (B):         x=18  y=200 w=130 h=50  cx=83  cy=225  R=148 B=250
    C  Std Prompt:           x=18  y=268 w=130 h=36  cx=83  cy=286  R=148 B=304
    D  Tursio Chat:          x=200 y=82  w=140 h=46  cx=270 cy=105  L=200 R=340 T=82  B=128
    E  ChatGPT:              x=200 y=202 w=140 h=46  cx=270 cy=225  L=200 R=340 T=202 B=248
    F  Deep-Eval:            x=530 y=140 w=140 h=60  cx=600 cy=170  L=530 R=670 T=140 B=200
    G  Persona/KPI/Q input:  x=530 y=62  w=140 h=52  cx=600 cy=88   B=114
    H  Metrics output:       x=700 y=152 w=110 h=36  cx=755 cy=170  L=700
  -->

  <!-- ══ ARROWS (drawn first, boxes on top) ══ -->

  <!-- A → D -->
  <line x1="148" y1="105" x2="200" y2="105" stroke="#1D4ED8" stroke-width="1.2" marker-end="url(#arrB)"/>

  <!-- B → E -->
  <line x1="148" y1="225" x2="200" y2="225" stroke="#065F46" stroke-width="1.2" marker-end="url(#arrG)"/>

  <!-- C → E (standardized prompt merges into ChatGPT) -->
  <polyline points="148,286  174,286  174,248  200,248" fill="none" stroke="#065F46" stroke-width="1.2" marker-end="url(#arrG)"/>

  <!-- D → F (answer path, top) -->
  <polyline points="340,105  450,105  450,162  530,162" fill="none" stroke="#1D4ED8" stroke-width="1.2" marker-end="url(#arrB)"/>
  <text x="370" y="99" font-size="8" fill="#1D4ED8" font-style="italic">Answer</text>

  <!-- E → F (answer path, bottom) -->
  <polyline points="340,225  450,225  450,180  530,180" fill="none" stroke="#065F46" stroke-width="1.2" marker-end="url(#arrG)"/>
  <text x="370" y="221" font-size="8" fill="#065F46" font-style="italic">Answer</text>

  <!-- G → F (Persona/KPI/Q context, top) -->
  <line x1="600" y1="114" x2="600" y2="140" stroke="#92400E" stroke-width="1.2" marker-end="url(#arrO)"/>
  <text x="604" y="132" font-size="7.5" fill="#92400E" font-style="italic">context</text>

  <!-- F → H (metrics) -->
  <line x1="670" y1="170" x2="700" y2="170" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- ══ BOXES (on top) ══ -->

  <!-- A: Synthetic Custom Questions -->
  <rect x="18" y="80" width="130" height="50" rx="5" fill="url(#inputGrad)" stroke="#3B82F6" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="83" y="98" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1E40AF">Synthetic Custom</text>
  <text x="83" y="112" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1E40AF">Questions</text>
  <text x="83" y="124" text-anchor="middle" font-size="8" fill="#3B82F6" font-style="italic">(A)</text>

  <!-- B: Synthetic Real-World Questions -->
  <rect x="18" y="200" width="130" height="50" rx="5" fill="url(#inputGrad)" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="83" y="218" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#065F46">Synthetic Real-World</text>
  <text x="83" y="232" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#065F46">Questions</text>
  <text x="83" y="244" text-anchor="middle" font-size="8" fill="#059669" font-style="italic">(B)</text>

  <!-- C: Standardized Prompt -->
  <rect x="18" y="268" width="130" height="36" rx="5" fill="url(#inputGrad)" stroke="#64748B" stroke-width="1.1" filter="url(#shadow)" stroke-dasharray="5,3"/>
  <text x="83" y="282" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#334155">Standardized</text>
  <text x="83" y="296" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#334155">Prompt</text>

  <!-- D: Tursio Chat -->
  <rect x="200" y="82" width="140" height="46" rx="6" fill="url(#blueGrad)" stroke="#1D4ED8" stroke-width="1.4" filter="url(#shadowMed)"/>
  <text x="270" y="101" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E3A8A">Tursio Chat</text>
  <text x="270" y="116" text-anchor="middle" font-size="7.5" fill="#1D4ED8" font-style="italic">proprietary chatbot</text>
  <rect x="234" y="122" width="72" height="8" rx="2" fill="#1D4ED8" opacity="0.15"/>

  <!-- E: ChatGPT -->
  <rect x="200" y="202" width="140" height="46" rx="6" fill="url(#greenGrad)" stroke="#059669" stroke-width="1.4" filter="url(#shadowMed)"/>
  <text x="270" y="221" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">ChatGPT</text>
  <text x="270" y="236" text-anchor="middle" font-size="7.5" fill="#059669" font-style="italic">baseline chatbot</text>

  <!-- G: Persona / KPI / Question context box -->
  <rect x="530" y="62" width="140" height="52" rx="5" fill="url(#inputGrad)" stroke="#92400E" stroke-width="1.2" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="600" y="80" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#78350F">Persona, KPI</text>
  <text x="600" y="94" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#78350F">&amp; Question</text>
  <text x="600" y="108" text-anchor="middle" font-size="7.5" fill="#92400E" font-style="italic">evaluation context</text>

  <!-- F: Deep-Eval -->
  <rect x="530" y="140" width="140" height="60" rx="6" fill="url(#amberGrad)" stroke="#B45309" stroke-width="1.6" filter="url(#shadowMed)"/>
  <text x="600" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#78350F">DeepEval</text>
  <text x="600" y="178" text-anchor="middle" font-size="8" fill="#92400E" font-style="italic">LLM-as-judge</text>
  <text x="600" y="191" text-anchor="middle" font-size="7.5" fill="#92400E" font-style="italic">multi-criteria scoring</text>

  <!-- H: Metrics -->
  <rect x="700" y="152" width="120" height="36" rx="5" fill="url(#metricGrad)" stroke="#7C3AED" stroke-width="1.3" filter="url(#shadow)"/>
  <text x="760" y="166" text-anchor="middle" font-size="10" font-weight="bold" fill="#4C1D95">Metrics</text>
  <text x="760" y="180" text-anchor="middle" font-size="7.5" fill="#6D28D9" font-style="italic">correctness, relevance…</text>

  <!-- ══ Row bracket labels ══ -->
  <!-- Top track label -->
  <text x="270" y="76" text-anchor="middle" font-size="8" fill="#1D4ED8" font-style="italic" font-weight="bold">Track A — Custom Questions</text>
  <!-- Bottom track label -->
  <text x="270" y="196" text-anchor="middle" font-size="8" fill="#059669" font-style="italic" font-weight="bold">Track B — Real-World Questions</text>

  <!-- Bracket lines for tracks -->
  <line x1="18" y1="72" x2="340" y2="72" stroke="#1D4ED8" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="18" y1="168" x2="340" y2="168" stroke="#CBD5E1" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="18" y1="192" x2="340" y2="192" stroke="#059669" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- ══ Legend ══ -->
  <rect x="18" y="315" width="822" height="18" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="0.8"/>
  <rect x="26" y="320" width="8" height="8" rx="1.5" fill="url(#inputGrad)" stroke="#64748B" stroke-width="0.8"/>
  <text x="38" y="328" font-size="7.5" fill="#475569">Input</text>
  <rect x="72" y="320" width="8" height="8" rx="1.5" fill="url(#blueGrad)" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="84" y="328" font-size="7.5" fill="#475569">Tursio Chat (A)</text>
  <rect x="158" y="320" width="8" height="8" rx="1.5" fill="url(#greenGrad)" stroke="#059669" stroke-width="0.8"/>
  <text x="170" y="328" font-size="7.5" fill="#475569">ChatGPT (B)</text>
  <rect x="236" y="320" width="8" height="8" rx="1.5" fill="url(#amberGrad)" stroke="#B45309" stroke-width="0.8"/>
  <text x="248" y="328" font-size="7.5" fill="#475569">DeepEval Judge</text>
  <rect x="324" y="320" width="8" height="8" rx="1.5" fill="url(#metricGrad)" stroke="#7C3AED" stroke-width="0.8"/>
  <text x="336" y="328" font-size="7.5" fill="#475569">Output Metrics</text>
  <line x1="406" y1="324" x2="420" y2="324" stroke="#1D4ED8" stroke-width="1.1" marker-end="url(#arrB)"/>
  <text x="424" y="328" font-size="7.5" fill="#475569">Track A flow</text>
  <line x1="490" y1="324" x2="504" y2="324" stroke="#065F46" stroke-width="1.1" marker-end="url(#arrG)"/>
  <text x="508" y="328" font-size="7.5" fill="#475569">Track B flow</text>
  <line x1="564" y1="324" x2="578" y2="324" stroke="#92400E" stroke-width="1.1" marker-end="url(#arrO)"/>
  <text x="582" y="328" font-size="7.5" fill="#475569">Context injection</text>
  <rect x="650" y="320" width="26" height="8" rx="2" fill="none" stroke="#64748B" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="680" y="328" font-size="7.5" fill="#475569">External input (dashed)</text>
</svg>
